  <path d="M50 55H32" stroke="#C5911A" stroke-width="10" stroke-linecap="square"/>
  
  <!-- P (a la derecha) -->
  <path d="M50 35H70C78 35 78 55 70 55H50" stroke="#C5911A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
